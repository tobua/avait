name: push

on:
  push:
    branches: [main]

jobs:
  build-test-release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun check
      - run: bun types
      - run: bun test
      - name: 📢 Release
        uses: tobua/release-npm-action@v5
